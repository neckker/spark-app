name: Build (macOS)

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Rust targets (universal macOS)
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Build Tauri (macOS)
        run: bun run tauri build

      - name: Pack artifact (versioned)
        run: |
          APP_NAME='SPARK'
          VERSION='${{ github.ref_name }}'

          DMG_PATH="$(find src-tauri/target/release/bundle/dmg \
            -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$DMG_PATH" ]; then
            echo '❌ .dmg not found'
            exit 1
          fi

          DMG_NAME="${APP_NAME}-mac-${VERSION}.dmg"
          cp "$DMG_PATH" "$DMG_NAME"
          echo "✅ Created $DMG_NAME"

      - name: Upload to GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SPARK-mac-${{ github.ref_name }}.dmg

