name: Build Spark App (macOS universal + Windows)

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    env:
      VITE_WS_URL: wss://spark.solyth.fun/hub/ws
      VITE_BACKEND_URL: https://spark-api.solyth.fun
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          printf "%s" "$APPLE_CERTIFICATE" | base64 -D > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          openssl pkcs12 -in certificate.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -info -noout

          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application identity not found in keychain"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          echo "Using signing identity: $CERT_ID"

      - name: Build and upload Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          tauriScript: bun run tauri

      - name: Verify & staple macOS app
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/spark.app"

          echo "Verifying codesign..."
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          echo "Stapling notarization ticket..."
          xcrun stapler staple -v "$APP_PATH"

          echo "Gatekeeper assessment..."
          spctl -a -vv "$APP_PATH"

      - name: Build and upload Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          tauriScript: bun run tauri

      - name: Upload portable Windows exe
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            src-tauri/target/release/spark.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/spark.exe

      - name: Upload Windows update artifacts to spark-updates
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(cat src-tauri/tauri.conf.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "Version: $VERSION"

          gh release create "v$VERSION" \
            --repo solythbot/spark-updates \
            --title "Spark v$VERSION" \
            --notes "Auto-update release for v$VERSION" \
            --draft=false \
            || echo "Release already exists, continuing..."

          for f in \
            src-tauri/target/release/bundle/nsis/*.nsis.zip \
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig \
            src-tauri/target/release/bundle/msi/*.msi.zip \
            src-tauri/target/release/bundle/msi/*.msi.zip.sig; do
            [ -f "$f" ] && gh release upload "v$VERSION" "$f" \
              --repo solythbot/spark-updates --clobber || true
          done

      - name: Upload latest.json to spark-updates
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(cat src-tauri/tauri.conf.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")

          LATEST_JSON=$(find src-tauri/target -name "latest.json" 2>/dev/null | head -1)
          if [ -n "$LATEST_JSON" ]; then
            echo "Uploading latest.json from: $LATEST_JSON"
            gh release upload "v$VERSION" "$LATEST_JSON" \
              --repo solythbot/spark-updates --clobber
          else
            echo "latest.json not found, listing build output..."
            find src-tauri/target/release -maxdepth 4 -name "*.json" | head -20 || true
          fi

      - name: Zip macOS .app bundle (portable)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/spark.app"
          if [ ! -d "$APP_PATH" ]; then
            echo ".app not found at: $APP_PATH"
            ls -la "src-tauri/target/universal-apple-darwin/release/bundle/macos" || true
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "spark_${{ github.event.release.tag_name }}_macos_universal.app.zip"

      - name: Upload macOS portable .app.zip
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            spark_${{ github.event.release.tag_name }}_macos_universal.app.zip

      - name: Upload macOS update artifacts to spark-updates
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(cat src-tauri/tauri.conf.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")

          gh release create "v$VERSION" \
            --repo solythbot/spark-updates \
            --title "Spark v$VERSION" \
            --notes "Auto-update release for v$VERSION" \
            --draft=false \
            || echo "Release already exists, continuing..."

          for f in \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && gh release upload "v$VERSION" "$f" \
              --repo solythbot/spark-updates --clobber || true
          done
  