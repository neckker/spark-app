name: Build & Publish Spark App

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  VITE_WS_URL: wss://spark.solyth.fun/hub/ws
  VITE_BACKEND_URL: https://spark-api.solyth.fun
  PUBLIC_REPO: solythbot/spark-updates

jobs:
  # --- macOS universal (aarch64 + x86_64) ---
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer Certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          printf "%s" "$APPLE_CERTIFICATE" | base64 -D > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')

          if [ -z "$CERT_ID" ]; then
            echo "❌ Developer ID Application identity not found"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "✅ Signing identity: $CERT_ID"

      - name: Build Tauri app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --target universal-apple-darwin

      - name: Verify macOS app
        shell: bash
        run: |
          set -euo pipefail
          APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/spark.app"
          echo "🔎 codesign verify"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "✅ Gatekeeper assessment"
          spctl -a -vv "$APP"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          BUNDLE="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p artifacts

          # Updater artifacts
          cp "$BUNDLE/macos/spark.app.tar.gz"     artifacts/
          cp "$BUNDLE/macos/spark.app.tar.gz.sig" artifacts/

          # DMG installer
          cp "$BUNDLE"/dmg/*.dmg artifacts/

          # Portable .app.zip
          ditto -c -k --sequesterRsrc --keepParent \
            "$BUNDLE/macos/spark.app" \
            "artifacts/spark_${TAG}_macos_universal.app.zip"

          echo "📦 macOS artifacts:"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/
          retention-days: 1

  # --- Windows x86_64 ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          BUNDLE="src-tauri/target/release/bundle"
          mkdir -p artifacts

          # Updater artifacts (NSIS zip + signature)
          cp "$BUNDLE"/nsis/*.nsis.zip     artifacts/
          cp "$BUNDLE"/nsis/*.nsis.zip.sig artifacts/

          # NSIS installer
          cp "$BUNDLE"/nsis/*-setup.exe artifacts/

          # Portable exe
          cp src-tauri/target/release/spark.exe \
            "artifacts/spark_${TAG}_windows_portable.exe"

          echo "📦 Windows artifacts:"
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/
          retention-days: 1

  # --- Publish: gather all artifacts → single release ---
  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lhR artifacts/

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BASE_URL="https://github.com/${{ env.PUBLIC_REPO }}/releases/download/${TAG}"

          # Read signatures
          MACOS_SIG="$(cat artifacts/spark.app.tar.gz.sig)"
          WINDOWS_NSIS_ZIP="$(basename artifacts/*-setup.nsis.zip)"
          WINDOWS_SIG="$(cat "artifacts/${WINDOWS_NSIS_ZIP}.sig")"

          # Build latest.json with jq (proper JSON escaping)
          jq -n \
            --arg version   "$VERSION" \
            --arg notes     "Spark v${VERSION}" \
            --arg pub_date  "$PUB_DATE" \
            --arg mac_sig   "$MACOS_SIG" \
            --arg mac_url   "${BASE_URL}/spark.app.tar.gz" \
            --arg win_sig   "$WINDOWS_SIG" \
            --arg win_url   "${BASE_URL}/${WINDOWS_NSIS_ZIP}" \
            '{
              version:  $version,
              notes:    $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": { signature: $mac_sig, url: $mac_url },
                "darwin-aarch64":   { signature: $mac_sig, url: $mac_url },
                "darwin-x86_64":    { signature: $mac_sig, url: $mac_url },
                "windows-x86_64":   { signature: $win_sig, url: $win_url }
              }
            }' > artifacts/latest.json

          echo "✅ latest.json generated:"
          cat artifacts/latest.json

      - name: Publish release to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"

          # Delete existing release in public repo if re-running
          gh release delete "$TAG" \
            --repo "${{ env.PUBLIC_REPO }}" \
            --yes --cleanup-tag 2>/dev/null || true

          # Create release with all artifacts at once
          gh release create "$TAG" artifacts/* \
            --repo "${{ env.PUBLIC_REPO }}" \
            --title "Spark ${TAG}" \
            --notes "${{ github.event.release.body }}"

          echo "✅ Published to ${{ env.PUBLIC_REPO }}"

      - name: Upload artifacts to private repo release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/*
