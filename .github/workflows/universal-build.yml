name: Build Spark App (macOS universal + Windows)

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    env:
      VITE_WS_URL: wss://spark.solyth.fun/hub/ws
      VITE_BACKEND_URL: https://sparkx.solyth.fun
      VITE_LICENSE_API: https://license.solyth.fun
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Import Apple Developer Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          printf "%s" "$APPLE_CERTIFICATE" | base64 -D > certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          if [ -z "$CERT_ID" ]; then
            echo "❌ Developer ID Application identity not found in keychain"
            security find-identity -v -p codesigning build.keychain || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          echo "✅ Using signing identity: $CERT_ID"

      - name: Build and upload Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # macOS signing + notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          tauriScript: bun run tauri

      - name: Build and upload Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: ${{ matrix.args }}
          tauriScript: bun run tauri

      - name: Upload portable Windows exe
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            src-tauri/target/release/spark.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/spark.exe

      - name: Zip macOS .app bundle (portable)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/spark.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ .app not found at: $APP_PATH"
            echo "Contents of bundle/macos:"
            ls -la "src-tauri/target/universal-apple-darwin/release/bundle/macos" || true
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "spark_${{ github.event.release.tag_name }}_macos_universal.app.zip"

      - name: Upload macOS portable .app.zip
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            spark_${{ github.event.release.tag_name }}_macos_universal.app.zip
